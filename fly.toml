app = "whatsapp-ai-bot"

primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Add any environment variables here
  # For example:
  # BOT_NUMBER = "your-number@s.whatsapp.net"
  # OWNER_NUMBER = "your-number@s.whatsapp.net"
  SESSION_DIR = "/app/session"

[http_service]
  internal_port = 3000
  force_https = true
  [[http_service.ports]]
    port = 80
    handlers = ["http"]
  [[http_service.ports]]
    port = 443
    handlers = ["tls", "http"]

[http_service.checks]
  interval = 60000
  timeout = 10000
  grace_period = "30s"

[[mounts]]
  source = "whatsapp_session"
  destination = "/app/session"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

